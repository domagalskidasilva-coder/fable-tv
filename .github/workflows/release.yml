name: Release

# Publica instaladores ao enviar uma tag de versão (ex.: v0.2.0):
#   git tag v0.2.0 && git push origin v0.2.0
# Cada plataforma roda no seu próprio runner e anexa os artefatos à Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex.: v0.2.0)"
        required: true
        default: "v0.0.0"

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ---------------------------------------------------------------------------
  # Desktop: Windows (.exe NSIS) + Linux (.deb / .AppImage)
  # ---------------------------------------------------------------------------
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: "--bundles nsis"
          - os: ubuntu-22.04
            args: "--bundles deb,appimage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Dependências do Linux (webkit/gtk/appimage)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Instalar dependências do front-end
        run: npm ci

      - name: Compilar e publicar (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.TAG }}
          releaseName: "Fable TV ${{ env.TAG }}"
          releaseBody: "Baixe o instalador da sua plataforma nos assets abaixo."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ---------------------------------------------------------------------------
  # Android (.apk). Gera um APK *debug* — já é assinado com a chave de debug do
  # Android e instala normalmente para testes. Um APK de release assinado exige
  # uma keystore própria + um passo de assinatura (veja RELEASING.md).
  # ---------------------------------------------------------------------------
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependências do front-end
        run: npm ci

      - name: Inicializar projeto Android
        run: npx tauri android init --ci

      - name: Compilar APK (debug — instalável sem secrets)
        run: npx tauri android build --apk --debug

      - name: Coletar APKs
        id: apks
        run: |
          mkdir -p dist-apk
          find src-tauri/gen/android -path "*outputs/apk*" -name "*.apk" -exec cp {} dist-apk/ \;
          ls -la dist-apk

      - name: Publicar APK na Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist-apk/*.apk
          fail_on_unmatched_files: false
