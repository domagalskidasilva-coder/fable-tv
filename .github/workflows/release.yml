name: Release

# Publica instaladores ao enviar uma tag de versão (ex.: v0.2.0):
#   git tag v0.2.0 && git push origin v0.2.0
# Cada plataforma roda no seu próprio runner e anexa os artefatos à Release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag da release (ex.: v0.2.0)"
        required: true
        default: "v0.0.0"

permissions:
  contents: write

env:
  TAG: ${{ github.event.inputs.tag || github.ref_name }}

jobs:
  # ---------------------------------------------------------------------------
  # Desktop: Windows (.exe NSIS) + Linux (.deb / .AppImage)
  # ---------------------------------------------------------------------------
  desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: "--bundles nsis"
          - os: ubuntu-22.04
            args: "--bundles deb,appimage"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Dependências do Linux (webkit/gtk/appimage)
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Instalar dependências do front-end
        run: npm ci

      - name: Compilar e publicar (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ env.TAG }}
          releaseName: "Fable TV ${{ env.TAG }}"
          releaseBody: |
            Baixe o instalador da sua plataforma nos assets abaixo.

            ### Como instalar
            - **Windows** (`.exe`): o app ainda não tem assinatura paga, então o
              Windows mostra "Windows protegeu seu PC" — clique em **Mais informações → Executar assim mesmo**.
            - **Linux** (`.AppImage`): `chmod +x Fable*.AppImage && ./Fable*.AppImage`.
              Se pedir FUSE: `sudo apt install libfuse2`.
            - **Linux** (`.deb`): `sudo apt install ./Fable*.deb` (puxa o webkit2gtk automaticamente).
            - **Android** (`.apk`): ative **"Instalar apps desconhecidos"** para o seu
              navegador/gerenciador de arquivos e abra o APK.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  # ---------------------------------------------------------------------------
  # Android (.apk): build de RELEASE (otimizado/stripped) assinado com uma
  # keystore gerada no CI -> APK pequeno (~30-40 MB) e instalável. Um debug
  # build aqui gerava ~730 MB com símbolos e não instalava.
  # ---------------------------------------------------------------------------
  android:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar NDK
        run: |
          sdkmanager "ndk;26.1.10909125"
          echo "NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> "$GITHUB_ENV"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Instalar dependências do front-end
        run: npm ci

      - name: Inicializar projeto Android
        run: npx tauri android init --ci

      - name: Gerar keystore + configurar assinatura
        run: |
          keytool -genkeypair -v -keystore "$RUNNER_TEMP/fable.jks" \
            -alias fable -keyalg RSA -keysize 2048 -validity 3650 \
            -storepass fabletv -keypass fabletv \
            -dname "CN=Fable TV, O=Fable TV, C=BR"
          {
            echo "storeFile=$RUNNER_TEMP/fable.jks"
            echo "storePassword=fabletv"
            echo "keyAlias=fable"
            echo "password=fabletv"
          } > src-tauri/gen/android/keystore.properties

      - name: Compilar APK release
        run: npx tauri android build --apk

      - name: Garantir APK assinado + coletar
        run: |
          mkdir -p dist-apk
          APK=$(find src-tauri/gen/android -path "*outputs/apk*release*" -name "*.apk" | grep -i universal | head -1)
          [ -z "$APK" ] && APK=$(find src-tauri/gen/android -path "*outputs/apk*release*" -name "*.apk" | head -1)
          echo "APK de release: $APK"
          BT=$(ls "$ANDROID_SDK_ROOT/build-tools" | sort -V | tail -1)
          TOOLS="$ANDROID_SDK_ROOT/build-tools/$BT"
          if echo "$APK" | grep -qi "unsigned"; then
            "$TOOLS/zipalign" -f -p 4 "$APK" /tmp/aligned.apk
            "$TOOLS/apksigner" sign --ks "$RUNNER_TEMP/fable.jks" \
              --ks-pass pass:fabletv --key-pass pass:fabletv \
              --out dist-apk/FableTV-Android.apk /tmp/aligned.apk
          else
            cp "$APK" dist-apk/FableTV-Android.apk
          fi
          "$TOOLS/apksigner" verify --verbose dist-apk/FableTV-Android.apk
          ls -la dist-apk

      - name: Publicar APK na Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          files: dist-apk/FableTV-Android.apk
          fail_on_unmatched_files: false
